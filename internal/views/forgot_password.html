<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password — min-idp</title>
  <style>
    :root {
      --bg:         #f5f7fa;
      --card:       #ffffff;
      --shadow:     0 4px 24px rgba(0,0,0,.08);
      --text:       #111827;
      --sub:        #6b7280;
      --label:      #374151;
      --border:     #d1d5db;
      --input-bg:   #ffffff;
      --input-text: #111827;
      --error-bg:   #fef2f2;
      --error-bd:   #fecaca;
      --error-tx:   #dc2626;
      --ok-bg:      #ecfdf5;
      --ok-bd:      #a7f3d0;
      --ok-tx:      #047857;
      --toggle-bg:  #e5e7eb;
      --toggle-ico: "🌙";
    }
    :root:has(#dark-toggle:checked) {
      --bg:         #0f1117;
      --card:       #1a1d27;
      --shadow:     0 4px 24px rgba(0,0,0,.4);
      --text:       #f3f4f6;
      --sub:        #9ca3af;
      --label:      #d1d5db;
      --border:     #374151;
      --input-bg:   #111827;
      --input-text: #f3f4f6;
      --error-bg:   #2d1515;
      --error-bd:   #7f1d1d;
      --error-tx:   #fca5a5;
      --ok-bg:      #052e22;
      --ok-bd:      #065f46;
      --ok-tx:      #6ee7b7;
      --toggle-bg:  #374151;
      --toggle-ico: "☀️";
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      transition: background .25s, color .25s;
    }
    #dark-toggle { display: none; }
    .toggle-btn {
      position: fixed; top: 16px; right: 16px;
      width: 38px; height: 38px;
      background: var(--toggle-bg);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .25s;
      user-select: none;
    }
    .toggle-btn::after { content: var(--toggle-ico); }
    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      transition: background .25s, box-shadow .25s;
    }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
      margin: 0 auto 20px;
    }
    h1 { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .sub { text-align: center; font-size: 14px; color: var(--sub); margin-bottom: 28px; }
    .field-label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--label); margin-bottom: 6px;
    }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 10px 12px;
      background: var(--input-bg); color: var(--input-text);
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border-color .2s, background .25s, color .25s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #4f46e5; }
    .error {
      background: var(--error-bg); border: 1px solid var(--error-bd);
      color: var(--error-tx); border-radius: 8px;
      padding: 10px 12px; font-size: 13px; margin-bottom: 16px;
    }
    .ok {
      background: var(--ok-bg); border: 1px solid var(--ok-bd);
      color: var(--ok-tx); border-radius: 8px;
      padding: 10px 12px; font-size: 13px; margin-bottom: 16px;
    }
    .submit-btn {
      width: 100%; padding: 11px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .2s;
    }
    .submit-btn:hover { background: #4338ca; }
    .footer-link {
      margin-top: 16px; text-align: center; font-size: 13px;
    }
    .footer-link a { color: #4f46e5; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <input type="checkbox" id="dark-toggle" onchange="localStorage.setItem('theme',this.checked?'dark':'light')">
  <label class="toggle-btn" for="dark-toggle"></label>
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=s?s==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;
      if(d)document.getElementById('dark-toggle').checked=true;
    })();
  </script>
  <div class="card">
    <div class="logo">M</div>
    <h1>Reset your password</h1>
    <p class="sub">Enter your email and we'll send you a reset link.</p>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    {{if .Message}}<div class="ok">{{.Message}}</div>{{end}}
    <form id="forgot-form" method="POST" action="/api/auth/forgot-password" autocomplete="off">
      <label class="field-label" for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email">
      <input type="hidden" name="code_challenge" id="code_challenge">
      <input type="hidden" name="code_challenge_method" id="code_challenge_method">
      <button class="submit-btn" type="submit">Send reset link</button>
    </form>
    <div class="footer-link"><a href="/login">Back to sign in</a></div>
  </div>
  <script>
    (function(){
      var form = document.getElementById('forgot-form');
      if (!form || !window.crypto || !window.crypto.subtle) return;

      function base64url(bytes) {
        var s = ''; for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
        return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      }

      form.addEventListener('submit', function(e){
        if (form.dataset.pkceReady === '1') return; // already prepared, let it submit
        e.preventDefault();

        var verifierBytes = new Uint8Array(32);
        window.crypto.getRandomValues(verifierBytes);
        var verifier = base64url(verifierBytes);

        window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)).then(function(buf){
          var challenge = base64url(new Uint8Array(buf));
          try { localStorage.setItem('min_idp_pw_reset_verifier', verifier); } catch(_) {}
          document.getElementById('code_challenge').value = challenge;
          document.getElementById('code_challenge_method').value = 'S256';
          form.dataset.pkceReady = '1';
          form.submit();
        }).catch(function(){
          // SubtleCrypto failed — submit without PKCE (server falls back gracefully).
          form.dataset.pkceReady = '1';
          form.submit();
        });
      });
    })();
  </script>
</body>
</html>
