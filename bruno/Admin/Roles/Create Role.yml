info:
  name: Create Role
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/admin/roles"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "name": "my-role",
        "description": "A custom role"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
