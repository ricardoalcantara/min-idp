info:
  name: Update User
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/users/{{?userId}}"
  body:
    type: json
    data: |-
      {
        "roles": [
          "system:admin",
          "sp:login",
          "readwrite"
        ]
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
