info:
  name: Update SP
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/sps/{{spId}}"
  body:
    type: json
    data: |-
      {
        "name": "Updated Name",
        "enabled": true
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
