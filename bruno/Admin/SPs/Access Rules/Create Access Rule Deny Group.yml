info:
  name: Create Access Rule Deny Group
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/admin/sps/{{?spId}}/access-rules"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "rule_type": "deny",
        "subject_type": "group",
        "subject_id": "{{?groupId}}",
        "priority": 5
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
