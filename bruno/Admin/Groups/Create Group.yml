info:
  name: Create Group
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/admin/groups"
  auth:
    type: bearer
    token: "{{sessionId}}"
  body:
    type: json
    data: |-
      {
        "name": "engineering",
        "description": "Engineering team"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
