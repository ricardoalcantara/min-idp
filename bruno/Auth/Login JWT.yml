info:
  name: Login JWT
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@min-idp.local",
        "password": "{{adminPassword}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("accessToken", res.body.access_token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
