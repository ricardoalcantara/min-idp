info:
  name: Get SP
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/admin/sps/{{?spId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: if (res.getStatus() === 200) { bru.setEnvVar("spId", res.getBody().id); }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
