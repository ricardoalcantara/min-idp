info:
  name: Reset Password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/admin/users/{{?userId}}/password"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "password": "{{?password}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
