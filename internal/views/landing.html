<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>min-idp</title>
  <style>
    :root {
      --bg:#f5f7fa;--card:#fff;--shadow:0 4px 24px rgba(0,0,0,.08);
      --text:#111827;--sub:#6b7280;--border:#e5e7eb;--muted:#6b7280;
      --toggle-bg:#e5e7eb;
    }
    :root:has(#dark-toggle:checked){
      --bg:#0f1117;--card:#1a1d27;--shadow:0 4px 24px rgba(0,0,0,.4);
      --text:#f3f4f6;--sub:#9ca3af;--border:#2d3149;--muted:#9ca3af;
      --toggle-bg:#374151;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);transition:background .25s,color .25s;}
    #dark-toggle{display:none;}
    .toggle-btn{position:fixed;top:16px;right:16px;width:38px;height:38px;
      background:var(--toggle-bg);border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:18px;
      transition:background .25s;user-select:none;}
    .toggle-btn::after{content:var(--toggle-ico,"🌙");}
    :root:has(#dark-toggle:checked) .toggle-btn::after{content:"☀️";}
    .wrap{width:100%;max-width:400px;padding:1.5rem;text-align:center;}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
      border-radius:14px;display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:700;font-size:22px;margin:0 auto 20px;}
    h1{font-size:26px;font-weight:700;margin-bottom:6px;}
    .tagline{font-size:15px;color:var(--muted);margin-bottom:36px;}
    .actions{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
    .btn{display:block;width:100%;padding:12px;border-radius:9px;font-size:15px;
      font-weight:600;cursor:pointer;border:none;text-decoration:none;
      transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .btn-primary{background:#4f46e5;color:#fff;}
    .btn-secondary{background:var(--card);color:var(--text);
      border:1.5px solid var(--border);}
    .divider{height:1px;background:var(--border);margin-bottom:24px;}
    .links{display:flex;flex-direction:column;gap:8px;}
    .link{font-size:13px;color:var(--muted);text-decoration:none;
      display:flex;align-items:center;justify-content:center;gap:6px;}
    .link:hover{color:var(--text);}
    .link-label{font-size:10px;font-weight:600;text-transform:uppercase;
      letter-spacing:.05em;background:var(--border);color:var(--muted);
      padding:1px 5px;border-radius:4px;}
  </style>
</head>
<body>
  <input type="checkbox" id="dark-toggle" onchange="localStorage.setItem('theme',this.checked?'dark':'light')">
  <label class="toggle-btn" for="dark-toggle"></label>
  <script>
    (function(){
      var el=document.getElementById('dark-toggle');
      var s=localStorage.getItem('theme');
      var d=s?s==='dark':matchMedia('(prefers-color-scheme:dark)').matches;
      if(d)el.checked=true;
    })();
  </script>
  <div class="wrap">
    <div class="logo">M</div>
    <h1>min-idp</h1>
    <p class="tagline">Minimal Identity Provider</p>
    <div class="actions">
      <a class="btn btn-primary" href="/login">Sign in</a>
      <a class="btn btn-secondary" href="/info">Session info</a>
    </div>
    <div class="divider"></div>
    <div class="links">
      <a class="link" href="/.well-known/openid-configuration">
        <span class="link-label">OIDC</span> Discovery document
      </a>
      <a class="link" href="/saml/metadata">
        <span class="link-label">SAML</span> SP metadata
      </a>
    </div>
  </div>
</body>
</html>
