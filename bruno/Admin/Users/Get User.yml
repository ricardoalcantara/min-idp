info:
  name: Get User
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/admin/users/{{?userId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: if (res.getStatus() === 200) { bru.setEnvVar("userId", res.getBody().id); }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
