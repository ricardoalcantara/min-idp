openapi: "3.1.0"

info:
  title: min-idp API
  description: Minimal self-hosted Identity Provider supporting OIDC/OAuth 2.0 and SAML 2.0.
  version: 0.1.0-alpha

servers:
  - url: http://localhost:8081
    description: Local development
  - url: https://min-idp.toquinha.online
    description: Production

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          description: Email address or username
          example: admin
        password:
          type: string
          example: admin

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        code_challenge:
          type: string
          description: |
            Optional PKCE code challenge. When provided, the matching
            `code_verifier` will be required on the subsequent reset call.
            The HTML reset form always sets this; JSON API callers may opt in.
        code_challenge_method:
          type: string
          enum: [S256, plain]
          description: |
            Required when `code_challenge` is set. The HTML form uses `S256`.
            Any other value (including an empty method with a non-empty
            challenge) is rejected.

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          description: Raw token received via the password reset email.
        password:
          type: string
          minLength: 8
          description: New password (minimum 8 characters).
        code_verifier:
          type: string
          description: |
            Required when the original forgot-password request set a
            `code_challenge`. Ignored otherwise.

    UserDto:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        roles:
          type: array
          items:
            type: string

    CreateUserDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        name:
          type: string
        password:
          type: string
          minLength: 8

    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]

    UpdateMeDto:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        name:
          type: string

    ResetPasswordDto:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8

    AssignRoleDto:
      type: object
      required: [role_id]
      properties:
        role_id:
          type: string
          format: uuid

    RoleDto:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        system:
          type: boolean

    CreateRoleDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateRoleDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    SPDto:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]
        enabled:
          type: boolean

    CreateSPDto:
      type: object
      required: [slug, name, protocol]
      properties:
        slug:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]

    OIDCClientDto:
      type: object
      properties:
        client_id:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        post_logout_redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        token_endpoint_auth:
          type: string
          enum: [none, client_secret_basic, client_secret_post]
        pkce_required:
          type: boolean

    UpdateOIDCClientDto:
      allOf:
        - $ref: '#/components/schemas/OIDCClientDto'
        - type: object
          required: [client_id]
          properties:
            client_secret:
              type: string
              description: Required when creating a confidential client. Must be omitted for public clients (`token_endpoint_auth` = `none`).

    SAMLClientDto:
      type: object
      properties:
        entity_id:
          type: string
        acs_urls:
          type: array
          items:
            type: string
        slo_url:
          type: string
        name_id_format:
          type: string
        want_signed_requests:
          type: boolean
        want_signed_assertions:
          type: boolean

    AccessRuleDto:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        rule_type:
          type: string
          enum: [allow, deny]
        subject_type:
          type: string
          enum: [role, user]
        subject_uuid:
          type: string
          format: uuid
        priority:
          type: integer

    CreateAccessRuleDto:
      type: object
      required: [rule_type, subject_type, subject_uuid]
      properties:
        rule_type:
          type: string
          enum: [allow, deny]
        subject_type:
          type: string
          enum: [role, user]
        subject_uuid:
          type: string
          format: uuid
        priority:
          type: integer
          default: 0

    KeyDto:
      type: object
      properties:
        kid:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]
        algorithm:
          type: string
        public_key:
          type: string
        certificate:
          type: string
        status:
          type: string
          enum: [active, retired]
        activated_at:
          type: string
          format: date-time

    SessionDto:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        ip:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ErrorDto:
      type: object
      properties:
        error:
          type: string

    MessageDto:
      type: object
      properties:
        message:
          type: string

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with email/username and password. Returns a Bearer token (API) or sets a session cookie (form).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: JWT access token (JSON login)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "303":
          description: Redirect to /info (form login)
        "401":
          description: Invalid credentials

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current session. Pass `?redirect=` to redirect instead of returning 204.
      responses:
        "204":
          description: Logged out
        "303":
          description: Redirect (when ?redirect= is set)

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      description: |
        Triggers a password reset email if the address belongs to an active
        account. To avoid account enumeration this endpoint always returns
        200 with the same generic message regardless of whether the email
        exists or the account is active.

        Supports optional PKCE: when `code_challenge` is provided, the
        accompanying `code_verifier` will be required on the subsequent
        `/api/auth/reset-password` call. The browser-facing HTML form always
        opts in to PKCE.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        "200":
          description: Generic acknowledgement (sent regardless of email existence).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDto'
        "400":
          description: Malformed request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDto'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a token
      description: |
        Consumes a single-use reset token, updates the user's password, and
        revokes existing sessions. The token is invalidated immediately on
        success.

        If the original forgot-password request included a `code_challenge`,
        `code_verifier` must be supplied here. All token-validation failures
        (invalid, expired, wrong verifier) collapse to the same 400 error so
        no information about token state is leaked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDto'
        "400":
          description: Invalid/expired token, missing verifier, or password too short.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDto'

  # ── Me ───────────────────────────────────────────────────────────────────

  /api/me:
    get:
      tags: [Me]
      summary: Get current user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
          description: Current user profile
    patch:
      tags: [Me]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeDto'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
          description: Updated profile

  /api/me/sessions:
    get:
      tags: [Me]
      summary: List my sessions
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionDto'

  /api/me/sessions/{uuid}:
    delete:
      tags: [Me]
      summary: Revoke a session
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Session revoked

  /api/me/sessions/others:
    delete:
      tags: [Me]
      summary: Revoke all other sessions
      responses:
        "204":
          description: Other sessions revoked

  # ── Admin — Users ─────────────────────────────────────────────────────────

  /api/admin/users:
    get:
      tags: [Admin / Users]
      summary: List users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserDto'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
    post:
      tags: [Admin / Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /api/admin/users/{id}:
    get:
      tags: [Admin / Users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
    patch:
      tags: [Admin / Users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
    delete:
      tags: [Admin / Users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /api/admin/users/{id}/password:
    post:
      tags: [Admin / Users]
      summary: Reset password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        "204":
          description: Password reset

  /api/admin/users/{id}/roles:
    get:
      tags: [Admin / Users]
      summary: List user roles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleDto'
    post:
      tags: [Admin / Users]
      summary: Assign role to user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleDto'
      responses:
        "204":
          description: Role assigned

  /api/admin/users/{id}/roles/{roleId}:
    delete:
      tags: [Admin / Users]
      summary: Remove role from user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role removed

  /api/admin/users/{id}/sessions:
    get:
      tags: [Admin / Users]
      summary: List user sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionDto'

  # ── Admin — Roles ─────────────────────────────────────────────────────────

  /api/admin/roles:
    get:
      tags: [Admin / Roles]
      summary: List roles
      responses:
        "200":
          description: All roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleDto'
    post:
      tags: [Admin / Roles]
      summary: Create role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleDto'
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDto'

  /api/admin/roles/{id}:
    get:
      tags: [Admin / Roles]
      summary: Get role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDto'
    patch:
      tags: [Admin / Roles]
      summary: Update role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleDto'
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDto'
    delete:
      tags: [Admin / Roles]
      summary: Delete role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  # ── Admin — Service Providers ─────────────────────────────────────────────

  /api/admin/sps:
    get:
      tags: [Admin / Service Providers]
      summary: List service providers
      responses:
        "200":
          description: All SPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SPDto'
    post:
      tags: [Admin / Service Providers]
      summary: Create service provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSPDto'
      responses:
        "201":
          description: Created SP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SPDto'

  /api/admin/sps/{id}:
    get:
      tags: [Admin / Service Providers]
      summary: Get service provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SPDto'
    patch:
      tags: [Admin / Service Providers]
      summary: Update service provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSPDto'
      responses:
        "200":
          description: Updated SP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SPDto'
    delete:
      tags: [Admin / Service Providers]
      summary: Delete service provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /api/admin/sps/{id}/oidc:
    get:
      tags: [Admin / Service Providers]
      summary: Get OIDC config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OIDC client config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCClientDto'
    put:
      tags: [Admin / Service Providers]
      summary: Update OIDC config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOIDCClientDto'
      responses:
        "200":
          description: Updated OIDC config

  /api/admin/sps/{id}/saml:
    get:
      tags: [Admin / Service Providers]
      summary: Get SAML config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SAML client config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SAMLClientDto'
    put:
      tags: [Admin / Service Providers]
      summary: Update SAML config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SAMLClientDto'
      responses:
        "200":
          description: Updated SAML config

  /api/admin/sps/{id}/access-rules:
    get:
      tags: [Admin / Service Providers]
      summary: List access rules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Access rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessRuleDto'
    post:
      tags: [Admin / Service Providers]
      summary: Create access rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessRuleDto'
      responses:
        "201":
          description: Created access rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRuleDto'

  /api/admin/sps/{id}/access-rules/{ruleId}:
    delete:
      tags: [Admin / Service Providers]
      summary: Delete access rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  # ── Admin — Keys ──────────────────────────────────────────────────────────

  /api/admin/keys:
    get:
      tags: [Admin / Keys]
      summary: List active keys (one per protocol)
      responses:
        "200":
          description: Active signing keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyDto'

  /api/admin/keys/all:
    get:
      tags: [Admin / Keys]
      summary: List all keys (including retired)
      responses:
        "200":
          description: All signing keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyDto'

  /api/admin/keys/{protocol}/rotate:
    post:
      tags: [Admin / Keys]
      summary: Rotate signing key
      parameters:
        - name: protocol
          in: path
          required: true
          schema:
            type: string
            enum: [oidc, saml]
      responses:
        "200":
          description: New active key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyDto'

  # ── Admin — Audit ─────────────────────────────────────────────────────────

  /api/admin/audit:
    get:
      tags: [Admin / Audit]
      summary: List audit events
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Audit events

  # ── OIDC ──────────────────────────────────────────────────────────────────

  /.well-known/openid-configuration:
    get:
      tags: [OIDC]
      summary: OIDC Discovery document
      security: []
      responses:
        "200":
          description: Discovery metadata

  /.well-known/jwks.json:
    get:
      tags: [OIDC]
      summary: JSON Web Key Set
      security: []
      responses:
        "200":
          description: Public signing keys (JWKS)

  /oauth2/authorize:
    get:
      tags: [OIDC]
      summary: Authorization endpoint
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: scope
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256, plain]
        - name: nonce
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to redirect_uri with code

  /oauth2/token:
    post:
      tags: [OIDC]
      summary: Token endpoint
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                code_verifier:
                  type: string
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  refresh_token:
                    type: string
                  id_token:
                    type: string

  /oauth2/userinfo:
    get:
      tags: [OIDC]
      summary: UserInfo endpoint
      responses:
        "200":
          description: Authenticated user claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub:
                    type: string
                  email:
                    type: string
                  username:
                    type: string
                  name:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string

  /oauth2/introspect:
    post:
      tags: [OIDC]
      summary: Token introspection
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token introspection result

  /oauth2/revoke:
    post:
      tags: [OIDC]
      summary: Revoke token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token revoked

  /oauth2/logout:
    get:
      tags: [OIDC]
      summary: RP-initiated logout
      security: []
      parameters:
        - name: id_token_hint
          in: query
          schema:
            type: string
        - name: post_logout_redirect_uri
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Logout confirmation page

  # ── SAML ──────────────────────────────────────────────────────────────────

  /saml/metadata:
    get:
      tags: [SAML]
      summary: IdP metadata
      security: []
      responses:
        "200":
          description: SAML 2.0 IdP metadata XML
          content:
            application/samlmetadata+xml:
              schema:
                type: string

  /saml/sso:
    get:
      tags: [SAML]
      summary: SSO endpoint (HTTP-Redirect binding)
      security: []
      parameters:
        - name: SAMLRequest
          in: query
          required: true
          schema:
            type: string
        - name: RelayState
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to SP ACS with SAMLResponse
    post:
      tags: [SAML]
      summary: SSO endpoint (HTTP-POST binding)
      security: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLRequest:
                  type: string
                RelayState:
                  type: string
      responses:
        "302":
          description: Redirect to SP ACS with SAMLResponse

  /saml/slo:
    get:
      tags: [SAML]
      summary: Single Logout endpoint
      security: []
      parameters:
        - name: RelayState
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Logout confirmation page
