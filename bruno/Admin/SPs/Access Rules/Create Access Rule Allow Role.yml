info:
  name: Create Access Rule Allow Role
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/admin/sps/{{?spId}}/access-rules"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "rule_type": "allow",
        "subject_type": "role",
        "subject_id": "{{?roleId}}",
        "priority": 20
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
