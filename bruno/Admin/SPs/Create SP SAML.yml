info:
  name: Create SP SAML
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/admin/sps"
  body:
    type: json
    data: |-
      {
        "slug": "{{?slug}}",
        "name": "{{?name}}",
        "protocol": "saml"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: if (res.getStatus() === 201) { bru.setEnvVar("spId", res.getBody().id); }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
