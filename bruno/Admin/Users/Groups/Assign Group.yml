info:
  name: Assign Group
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/admin/users/{{?userId}}/groups"
  auth:
    type: bearer
    token: "{{accessToken}}"
  body:
    type: json
    data: |-
      {
        "group_id": "{{?groupId}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
