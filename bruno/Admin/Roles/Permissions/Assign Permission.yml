info:
  name: Assign Permission
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/admin/roles/{{?roleId}}/permissions"
  auth:
    type: bearer
    token: "{{sessionId}}"
  body:
    type: json
    data: |-
      {
        "name": "sp:login"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
