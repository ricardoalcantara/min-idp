info:
  name: Login Form
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: form-urlencoded
    data:
      - name: email
        value: admin@min-idp.local
      - name: password
        value: "{{adminPassword}}"

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("accessToken", res.body.access_token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
