info:
  name: Create SP
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/admin/sps"
  auth:
    type: bearer
    token: "{{sessionId}}"
  body:
    type: json
    data: |-
      {
        "slug": "my-app",
        "name": "My Application",
        "protocol": "oidc"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
